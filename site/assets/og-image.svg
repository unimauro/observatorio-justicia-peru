<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1228"/>
      <stop offset="0.55" stop-color="#102449"/>
      <stop offset="1" stop-color="#14305f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a437"/>
      <stop offset="1" stop-color="#f0c75e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="10" fill="url(#gold)"/>
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)"/>

  <!-- grid decor -->
  <g stroke="#22417a" stroke-width="1" opacity="0.35">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>

  <!-- scales emoji-ish glyph -->
  <text x="80" y="150" font-size="92" font-family="Arial, sans-serif">⚖️</text>

  <text x="80" y="270" font-size="68" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">Observatorio Nacional</text>
  <text x="80" y="350" font-size="68" font-weight="800" fill="url(#gold)" font-family="Arial, sans-serif">de Justicia del Perú</text>

  <text x="82" y="412" font-size="29" fill="#c9d4ec" font-family="Arial, sans-serif">Datos abiertos e inteligencia territorial del sistema de justicia</text>

  <!-- KPI chips -->
  <g font-family="Arial, sans-serif">
    <g>
      <rect x="80" y="510" width="245" height="78" rx="14" fill="#16244a" stroke="#223158"/>
      <text x="100" y="545" font-size="20" fill="#93a1c4">Carga procesal</text>
      <text x="100" y="575" font-size="26" font-weight="800" fill="#ffffff">3.7M expedientes</text>
    </g>
    <g>
      <rect x="345" y="510" width="225" height="78" rx="14" fill="#16244a" stroke="#223158"/>
      <text x="365" y="545" font-size="20" fill="#93a1c4">Demora promedio</text>
      <text x="365" y="575" font-size="26" font-weight="800" fill="#f0c75e">636 días</text>
    </g>
    <g>
      <rect x="590" y="510" width="225" height="78" rx="14" fill="#16244a" stroke="#223158"/>
      <text x="610" y="545" font-size="20" fill="#93a1c4">Congestión</text>
      <text x="610" y="575" font-size="26" font-weight="800" fill="#e74c3c">2.5 índice</text>
    </g>
    <g>
      <rect x="835" y="510" width="285" height="78" rx="14" fill="#16244a" stroke="#223158"/>
      <text x="855" y="545" font-size="20" fill="#93a1c4">Foco</text>
      <text x="855" y="575" font-size="26" font-weight="800" fill="#ffffff">Jueces · Fiscales · 🚨</text>
    </g>
  </g>

  <text x="1120" y="150" font-size="24" fill="#93a1c4" text-anchor="end" font-family="Arial, sans-serif">tunky.net · unimauro</text>
</svg>
