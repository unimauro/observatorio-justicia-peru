  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="10" fill="url(#teal)"/>
  <rect x="0" y="620" width="1200" height="10" fill="url(#coral)"/>

  <g stroke="#1e4a4a" stroke-width="1" opacity="0.4">
